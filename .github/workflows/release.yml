name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag and changelog
        run: |
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
          grep -q "$(node -p "require('./package.json').version")" CHANGELOG.md

      - name: Install and verify source
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Pack and smoke-test the published artifact
        run: |
          PACKAGE_TGZ=$(npm pack --json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d)[0].filename))")
          mkdir .release-smoke
          npm install --prefix .release-smoke "../$PACKAGE_TGZ"
          node .release-smoke/node_modules/mcp-agentic-server/dist/cli.js doctor

      - name: Publish with provenance
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify registry version
        run: test "$(npm view mcp-agentic-server version)" = "$(node -p "require('./package.json').version")"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
